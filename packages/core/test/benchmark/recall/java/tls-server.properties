# Transport security for the acme-gateway embedded connector.
# Pinned to the classical suites still required by the legacy partner
# integrations that have not finished their migration.

server.ssl.enabled=true
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2
server.ssl.ciphers=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_DHE_RSA_WITH_AES_128_GCM_SHA256
server.ssl.key-store=classpath:gateway-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=gateway
server.ssl.client-auth=need
