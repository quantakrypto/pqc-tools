# Release — build, test, and publish @quantakrypto/* to npm with provenance.
#
# Publishing is wired up but still gated so it can't fire by accident:
#   * it runs on a published GitHub Release, or a manual workflow_dispatch with
#     confirm = "publish" (any other dispatch value is a dry run), and
#   * every publish step requires the NPM_TOKEN secret — without it the job
#     fails loudly instead of half-publishing.
#
# To enable publishing:
#   1. Add the NPM_TOKEN repository secret (an npm automation token).
#   2. Bump the package versions, then either publish a GitHub Release or run
#      this workflow manually with confirm = "publish".
# The @quantakrypto/action package is distributed as a GitHub Action via
# `uses: quantakrypto/tools/packages/action@v1` (its dist/ is committed and
# kept fresh by the `action dist is fresh` CI gate), so it is NOT published to
# npm — see the commented step at the end of the publish job.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to actually publish. Anything else = dry run.'
        required: true
        default: "dry-run"

# Provenance attestation needs id-token: write (OIDC); contents read for checkout.
permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm (provenance)
    needs: build-test
    runs-on: ubuntu-latest
    # Publish on a published GitHub Release, or a manual run confirmed with "publish".
    if: ${{ github.event_name == 'release' || github.event.inputs.confirm == 'publish' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build

      # Guard: do nothing destructive unless the token is actually configured.
      - name: Check NPM_TOKEN is present
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Publishing is deferred (ROADMAP §5)."
            exit 1
          fi

      # Publish the shared library first (consumers depend on it), then the
      # leaf packages. --provenance produces a signed Sigstore attestation via
      # the id-token OIDC token, visible on each package's npm page.
      #
      # NOTE on @quantakrypto/action: its dist/ MUST be committed/bundled before it can
      # be consumed as a `uses:` action (ROADMAP §5). Publishing it to npm does not
      # remove that requirement; keep its publish line commented until dist is
      # committed and a "dist is fresh" CI gate exists.
      - name: Publish @quantakrypto/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @quantakrypto/core --provenance --access public

      - name: Publish @quantakrypto/qscan
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @quantakrypto/qscan --provenance --access public

      - name: Publish @quantakrypto/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @quantakrypto/mcp --provenance --access public

      - name: Publish @quantakrypto/sieve
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @quantakrypto/sieve --provenance --access public

      # - name: Publish @quantakrypto/action
      #   # BLOCKED until packages/action/dist is committed/bundled (ROADMAP §5).
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #   run: npm publish --workspace @quantakrypto/action --provenance --access public
