# Release — build, test, and publish @quantakrypto/* to npm with provenance.
#
# Publishing is wired up but still gated so it can't fire by accident:
#   * it runs on a published GitHub Release, or a manual workflow_dispatch with
#     confirm = "publish" (any other dispatch value is a dry run), and
#   * every publish step requires the NPM_TOKEN secret — without it the job
#     fails loudly instead of half-publishing.
#
# To enable publishing:
#   1. Add the NPM_TOKEN repository secret (an npm automation token).
#   2. Bump the package versions, then either publish a GitHub Release or run
#      this workflow manually with confirm = "publish".
# The @quantakrypto/action package is distributed as a GitHub Action via
# `uses: quantakrypto/pqc-tools/packages/action@v1` (its dist/ is committed and
# kept fresh by the `action dist is fresh` CI gate), so it is NOT published to
# npm — see the commented step at the end of the publish job.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to actually publish. Anything else = dry run.'
        required: true
        default: "dry-run"

# Least privilege by default; each job widens only what it needs (audit: scope
# id-token to publish, contents:write only to move the v1 tag).
permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Lint + format (don't publish code that fails CI gates)
        run: npm run lint && npm run format:check
      - name: Action dist is fresh (don't publish a stale bundle)
        run: |
          npm run bundle --workspace @quantakrypto/action
          if ! git diff --exit-code -- packages/action/dist; then
            echo "::error::packages/action/dist is stale — re-bundle and commit before releasing."
            exit 1
          fi

  publish:
    name: Publish to npm (provenance)
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write # move the moving v1 Action tag to the released commit
      id-token: write # provenance attestation (Sigstore OIDC)
    # Publish on a published GitHub Release, or a manual run confirmed with "publish".
    if: ${{ github.event_name == 'release' || github.event.inputs.confirm == 'publish' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build

      # Guard: do nothing destructive unless the token is actually configured.
      - name: Check NPM_TOKEN is present
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Publishing is deferred (ROADMAP §5)."
            exit 1
          fi

      # Publish every non-private workspace, skipping any version already on npm
      # so re-running on an unchanged tree is a clean no-op instead of an
      # "cannot publish over existing version" failure. --provenance produces a
      # signed Sigstore attestation via the id-token OIDC token, shown on npm.
      #
      # NOTE: @quantakrypto/action is marked "private" and is skipped here — it
      # ships as a GitHub Action via `uses: quantakrypto/pqc-tools/packages/action@v1`
      # (dist committed + kept fresh by the "action dist is fresh" CI gate), not npm.
      - name: Publish to npm (skip versions already published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          count=0
          for dir in packages/*/; do
            manifest="${dir}package.json"
            [ -f "$manifest" ] || continue
            if [ "$(node -p "require('./$manifest').private === true")" = "true" ]; then
              echo "— ${dir%/} is private — skipping"
              continue
            fi
            name=$(node -p "require('./$manifest').name")
            version=$(node -p "require('./$manifest').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "✓ ${name}@${version} already on npm — skipping"
            else
              echo "→ publishing ${name}@${version}"
              npm publish --workspace "${name}" --provenance --access public
              count=$((count + 1))
            fi
          done
          echo "Published ${count} new package version(s)."

      # Keep the moving major-version Action tag (v1) pointing at the just-released
      # commit so `uses: quantakrypto/pqc-tools/packages/action@v1` never serves a
      # stale, pre-security-fix bundle (2026-07-15 supply-chain audit). Runs only on
      # a real published Release, not a manual dry-run/publish dispatch.
      - name: Move the v1 Action tag to this release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git tag -f v1 "${GITHUB_SHA}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/v1"
          echo "moved the v1 Action tag -> ${GITHUB_SHA}"
