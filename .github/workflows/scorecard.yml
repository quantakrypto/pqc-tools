# OpenSSF Scorecard — automated supply-chain security scoring.
# Runs weekly + on push to main; uploads SARIF to the Security tab and publishes
# the score (public repo, OIDC). Complements the zero-runtime-dependency posture
# and SHA-pinned actions the project already maintains (docs/SUPPLY-CHAIN.md §2).
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  push:
    branches: [main]

# Least privilege at the workflow level; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish results (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          sarif_file: results.sarif
