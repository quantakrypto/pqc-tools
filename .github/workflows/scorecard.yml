# OpenSSF Scorecard — supply-chain security posture scoring.
#
# GATED TO MANUAL. Scorecard is designed for PUBLIC repositories: publishing the
# score to the OpenSSF API and uploading SARIF to the Security tab both require a
# public repo (and, for code scanning, GitHub Advanced Security). While
# `qproof-tools` is private this runs only on demand, so it never shows a red
# check on day-to-day pushes. When the repository is made public, re-enable the
# `schedule` + `push` triggers below and set `publish_results: true`.
# See docs/SUPPLY-CHAIN.md for how this maps to our assurance targets.
name: Scorecard

on:
  workflow_dispatch:
  # Re-enable these once the repository is public:
  # schedule:
  #   - cron: "27 6 * * 1" # Mondays 06:27 UTC
  # push:
  #   branches: [main]

# Least privilege at the top level; the analysis job elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for the publish-results OIDC token (when public).
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Flip to true once the repository is public (needs id-token: write).
          publish_results: false

      # Retain the raw SARIF as a build artifact for traceability.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      # Surfaces findings in the Security tab. Requires GitHub code scanning
      # (public repo or Advanced Security) — tolerated so a manual run on a
      # private repo still succeeds.
      - name: Upload SARIF to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
